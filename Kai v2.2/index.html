                                            </motion.div>
                                        ))}

                                        <AnimatePresence>
                                            {typingState && (
                                                <motion.div initial={{ opacity: 0, y: 6 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0 }} className="flex flex-col items-start gap-2">
                                                    {typingState.step === 'tool_call' && typingState.tool && (
                                                        <div className="flex items-center gap-1.5 px-2.5 py-1.5 bg-primary/5 border border-primary/10 rounded-lg text-[11px] text-primary font-medium">
                                                            <Zap className="h-3 w-3 shrink-0" />
                                                            <span>Calling</span>
                                                            <span className="font-mono bg-primary/10 px-1.5 py-0.5 rounded">{typingState.tool.id}</span>
                                                            <span className="flex gap-0.5 ml-0.5">
                                                                <span className="h-1 w-1 bg-primary rounded-full typing-dot" />
                                                                <span className="h-1 w-1 bg-primary rounded-full typing-dot" />
                                                                <span className="h-1 w-1 bg-primary rounded-full typing-dot" />
                                                            </span>
                                                        </div>
                                                    )}
                                                    {typingState.step === 'thinking' && (
                                                        typingState.type && typingState.type !== 'followup' ? (
                                                            <div className="px-3.5 py-3 bg-white border border-gray-100 shadow-sm rounded-2xl rounded-tl-sm w-[320px] max-w-[95%]">
                                                                {getSkeletonForType(typingState.type)}
                                                            </div>
                                                        ) : (
                                                            <div className="px-3.5 py-3 bg-white border border-gray-100 shadow-sm rounded-2xl rounded-tl-sm">
                                                                <span className="flex gap-1">
                                                                    <span className="h-1.5 w-1.5 bg-gray-300 rounded-full typing-dot" />
                                                                    <span className="h-1.5 w-1.5 bg-gray-300 rounded-full typing-dot" />
                                                                    <span className="h-1.5 w-1.5 bg-gray-300 rounded-full typing-dot" />
                                                                </span>
                                                            </div>
                                                        )
                                                    )}
                                                </motion.div>
                                            )}
                                        </AnimatePresence>

                                        {showSuggestions && (
                                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="flex flex-wrap gap-2 justify-end pt-2">
                                                {SUGGESTIONS.map((s, i) => (
                                                    <button key={i} onClick={() => sendMessage(s)}
                                                        className="px-3 py-2 bg-transparent hover:bg-gray-50 border border-gray-200 hover:border-gray-300 rounded-lg text-[12px] text-gray-500 hover:text-gray-700 font-normal transition-all whitespace-nowrap"
                                                    >
                                                        {s}
                                                    </button>
                                                ))}
                                            </motion.div>
                                        )}

                                        <div ref={messagesEndRef} />
                                    </div>

                                    <div className="p-3 bg-white border-t border-gray-100 relative shrink-0">
                                        <AnimatePresence>
                                            {showSlashMenu && hasSearchResults && (
                                                <motion.div
                                                    initial={{ opacity: 0, y: 8 }}
                                                    animate={{ opacity: 1, y: 0 }}
                                                    exit={{ opacity: 0, y: 8 }}
                                                    className="absolute bottom-full mb-2 left-3 right-3 bg-white border border-gray-200 rounded-xl shadow-2xl overflow-hidden z-50"
                                                >
                                                    <div className="px-3 py-2 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
                                                        <div className="flex items-center gap-1.5">
                                                            <span className="text-[12px] font-bold text-gray-400">/</span>
                                                            <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Tools</span>
                                                        </div>
                                                        {flatNavTools.length > 0 && (
                                                            <span className="text-[9px] text-gray-300 font-medium">↑↓ navigate · ↵ select</span>
                                                        )}
                                                    </div>
                                                    <div className="max-h-64 overflow-y-auto">
                                                        {flatNavTools.length === 0 && (
                                                            <div className="px-4 py-6 text-center">
                                                                <div className="text-[12px] text-gray-500 font-medium">No tools matching <span className="font-mono text-gray-700">"{searchQuery}"</span></div>
                                                                <div className="text-[10px] text-gray-400 mt-1">Try a different keyword or just ask in plain language</div>
                                                            </div>
                                                        )}
                                                        {showRecent && RECENT_TOOLS.length > 0 && (
                                                            <>
                                                                <div className="px-3 pt-2 pb-1 flex items-center gap-1.5">
                                                                    <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="text-gray-400"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                                                    <span className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Recent</span>
                                                                </div>
                                                                {RECENT_TOOLS.map((tool, i) => {
                                                                    const idx = i;
                                                                    const isSel = selectedToolIdx === idx;
                                                                    return (
                                                                        <div key={`r-${i}`} onClick={() => { setInput(`/${tool.id} `); setShowSlashMenu(false); textareaRef.current?.focus(); }}
                                                                            onMouseEnter={() => setSelectedToolIdx(idx)}
                                                                            className={cn("flex items-start gap-3 px-3 py-2 cursor-pointer", isSel ? "bg-primary/5" : "hover:bg-gray-50")}
                                                                        >
                                                                            <div className="mt-0.5 h-6 w-6 rounded bg-primary/5 border border-primary/10 flex items-center justify-center text-primary shrink-0">
                                                                                <tool.icon className="h-3 w-3" />
                                                                            </div>
                                                                            <div>
                                                                                <div className="text-[12px] font-semibold text-gray-900">{tool.title}</div>
                                                                                <div className="text-[11px] text-gray-400 leading-tight mt-0.5">{tool.desc}</div>
                                                                            </div>
                                                                        </div>
                                                                    );
                                                                })}
                                                                <div className="h-px bg-gray-100 mx-3 my-1" />
                                                            </>
                                                        )}
                                                        {filteredMainTools.length > 0 && (
                                                            <>
                                                                {showRecent && (
                                                                    <div className="px-3 pt-1 pb-1">
                                                                        <span className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Featured</span>
                                                                    </div>
                                                                )}
                                                                {filteredMainTools.map((tool, i) => {
                                                                    const idx = (showRecent ? RECENT_TOOLS.length : 0) + i;
                                                                    const isSel = selectedToolIdx === idx;
                                                                    return (
                                                                        <div key={`m-${i}`} onClick={() => { setInput(`/${tool.id} `); setShowSlashMenu(false); textareaRef.current?.focus(); }}
                                                                            onMouseEnter={() => setSelectedToolIdx(idx)}
                                                                            className={cn("flex items-start gap-3 px-3 py-2 cursor-pointer", isSel ? "bg-primary/5" : "hover:bg-gray-50")}
                                                                        >
                                                                            <div className="mt-0.5 h-6 w-6 rounded bg-primary/5 border border-primary/10 flex items-center justify-center text-primary shrink-0">
                                                                                <tool.icon className="h-3 w-3" />
                                                                            </div>
                                                                            <div>
                                                                                <div className="text-[12px] font-semibold text-gray-900">{tool.title}</div>
                                                                                <div className="text-[11px] text-gray-400 leading-tight mt-0.5">{tool.desc}</div>
                                                                            </div>
                                                                        </div>
                                                                    );
                                                                })}
                                                            </>
                                                        )}
                                                        {filteredAllTools.length > 0 && (
                                                            <>
                                                                {filteredMainTools.length > 0 && <div className="h-px bg-gray-100 mx-3 my-1" />}
                                                                <button onClick={() => setExpandedAllTools(!expandedAllTools)}
                                                                    className="w-full flex items-center gap-2 px-3 py-2 hover:bg-gray-50 text-left transition-colors">
                                                                    <ChevronDown className={`h-3.5 w-3.5 text-gray-400 transition-transform ${expandedAllTools || shouldAutoExpandAllTools ? 'rotate-180' : ''}`} />
                                                                    <span className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">All Tools</span>
                                                                    <span className="text-[10px] text-gray-300 ml-auto">{filteredAllTools.length}</span>
                                                                </button>
                                                                <AnimatePresence>
                                                                    {(expandedAllTools || shouldAutoExpandAllTools) && (
                                                                        <motion.div initial={{ opacity: 0, height: 0 }} animate={{ opacity: 1, height: 'auto' }} exit={{ opacity: 0, height: 0 }}>
                                                                            {filteredAllTools.map((tool, i) => {
                                                                                const idx = (showRecent ? RECENT_TOOLS.length : 0) + filteredMainTools.length + i;
                                                                                const isSel = selectedToolIdx === idx;
                                                                                return (
                                                                                    <div key={`a-${i}`} onClick={() => { setInput(`/${tool.id} `); setShowSlashMenu(false); textareaRef.current?.focus(); }}
                                                                                        onMouseEnter={() => setSelectedToolIdx(idx)}
                                                                                        className={cn("flex items-start gap-3 px-3 py-2 cursor-pointer", isSel ? "bg-primary/5" : "hover:bg-gray-50")}
                                                                                    >
                                                                                        <div className="mt-0.5 h-6 w-6 rounded bg-gray-200/50 border border-gray-200 flex items-center justify-center text-gray-400 shrink-0">
                                                                                            <tool.icon className="h-3 w-3" />
                                                                                        </div>
                                                                                        <div>
                                                                                            <div className="text-[12px] font-semibold text-gray-700">{tool.title}</div>
                                                                                            <div className="text-[11px] text-gray-400 leading-tight mt-0.5">{tool.desc}</div>
                                                                                        </div>
                                                                                    </div>
                                                                                );
                                                                            })}
                                                                        </motion.div>
                                                                    )}
                                                                </AnimatePresence>
                                                            </>
                                                        )}
                                                    </div>
                                                </motion.div>
                                            )}
                                        </AnimatePresence>

                                        <div className="bg-gray-50 border border-gray-200 rounded-xl p-3 focus-within:border-primary focus-within:bg-white transition-all">
                                            <textarea
                                                ref={textareaRef}
                                                className="w-full h-14 resize-none outline-none text-[12px] font-medium text-gray-900 placeholder:text-gray-400 bg-transparent"
                                                placeholder="Ask anything, or type / to use a tool..."
                                                value={input}
                                                onChange={(e) => {
                                                    const val = e.target.value;
                                                    setInput(val);
                                                    setShowSlashMenu(val.startsWith('/'));
                                                }}
                                                onKeyDown={(e) => {
                                                    if (showSlashMenu && hasSearchResults && flatNavTools.length > 0) {
                                                        if (e.key === 'ArrowDown') { e.preventDefault(); setSelectedToolIdx(p => (p + 1) % flatNavTools.length); return; }
                                                        if (e.key === 'ArrowUp') { e.preventDefault(); setSelectedToolIdx(p => (p - 1 + flatNavTools.length) % flatNavTools.length); return; }
                                                        if (e.key === 'Enter' && !e.shiftKey) {
                                                            e.preventDefault();
                                                            const tool = flatNavTools[selectedToolIdx];
                                                            if (tool) { setInput(`/${tool.id} `); setShowSlashMenu(false); textareaRef.current?.focus(); }
                                                            return;
                                                        }
                                                    }
                                                    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(input); }
                                                    if (e.key === 'Escape') setShowSlashMenu(false);
                                                }}
                                            />
                                            <div className="flex items-center justify-between">
                                                <QuickTooltip text="Slash commands">
                                                    <button onClick={() => setAllToolsOpen(true)} className="h-6 w-6 border border-gray-200 rounded-md flex items-center justify-center text-gray-300 hover:text-gray-400 hover:border-gray-300 transition-colors font-bold text-sm">
                                                        /
                                                    </button>
                                                </QuickTooltip>
                                                <button onClick={() => sendMessage(input)}
                                                    className={cn("h-7 w-7 rounded-full flex items-center justify-center transition-colors",
                                                        input.trim() ? "bg-primary text-white hover:bg-blue-700" : "bg-gray-200 text-gray-400"
                                                    )}>
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                                                </button>
                                            </div>
                                            <div className="flex justify-center">
                                                <span className="text-[9px] text-gray-300 font-medium">↵ send · shift+↵ newline</span>
                                            </div>
                                        </div>
                                    </div>
                                </motion.aside>
                            )}
                        </AnimatePresence>

                        <Modal isOpen={pbxModalOpen} onClose={() => setPbxModalOpen(false)} title="New A/B test by prompt" subtitle="Create an experiment in seconds by prompting the AI."
                            footer={<><button onClick={() => setPbxModalOpen(false)} className="text-xs font-bold text-gray-500 flex items-center gap-1 hover:text-gray-700"><ChevronDown className="h-3 w-3 rotate-90" /> BACK</button><button className="px-6 py-2 bg-gray-100 text-gray-400 rounded-lg text-xs font-bold uppercase tracking-wider">CREATE</button></>}>
                            <div className="space-y-4">
                                <div className="space-y-1.5"><label className="text-[11px] font-bold text-gray-900 uppercase tracking-tight">Name</label><input type="text" placeholder="Give your experiment a name" className="w-full p-3 border border-gray-200 rounded-lg text-sm bg-white outline-none focus:ring-1 focus:ring-primary transition-all" /></div>
                                <div className="space-y-1.5"><label className="text-[11px] font-bold text-gray-900 uppercase tracking-tight">Project</label><div className="w-full p-3 border border-gray-200 rounded-lg text-sm bg-white flex items-center justify-between text-gray-400 cursor-pointer">Select a project<ChevronDown className="h-4 w-4" /></div></div>
                                <div className="space-y-1.5"><label className="text-[11px] font-bold text-gray-900 uppercase tracking-tight">URL</label><input type="text" placeholder="Enter the URL to launch the simulation" className="w-full p-3 border border-gray-200 rounded-lg text-sm bg-white outline-none focus:ring-1 focus:ring-primary transition-all" /></div>
                                <div className="space-y-1.5"><div className="flex justify-between items-center"><label className="text-[11px] font-bold text-gray-900 uppercase tracking-tight">Description</label><span className="text-[10px] text-gray-400">0 / 500</span></div><textarea rows="4" placeholder="Describe the purpose of your experiment." className="w-full p-3 border border-gray-200 rounded-lg text-sm bg-white outline-none focus:ring-1 focus:ring-primary transition-all resize-none"></textarea></div>
                                <button className="flex items-center gap-2 px-4 py-2 border border-primary text-primary rounded-lg text-xs font-bold hover:bg-primary/5 transition-colors"><Plus className="h-3.5 w-3.5" /> ADD TAG</button>
                            </div>
                        </Modal>

                        <Modal isOpen={chartModalOpen} onClose={() => setChartModalOpen(false)} title="EU Segment Results Summary" subtitle="Last 72 hours performance breakdown.">
                            <SimpleChart expanded />
                            <div className="mt-8 space-y-4">
                                <div className="p-4 bg-gray-50 rounded-lg grid grid-cols-3 gap-4">
                                    <div><div className="text-[10px] font-medium text-gray-400 uppercase tracking-wider">Revenue Uplift</div><div className="text-xl font-bold text-green-600">+$2,410</div></div>
                                    <div><div className="text-[10px] font-medium text-gray-400 uppercase tracking-wider">Confidence</div><div className="text-xl font-bold text-gray-900">94.2%</div></div>
                                    <div><div className="text-[10px] font-medium text-gray-400 uppercase tracking-wider">Visitors</div><div className="text-xl font-bold text-gray-900">12,402</div></div>
                                </div>
                                <p className="text-xs font-medium text-gray-600 leading-relaxed">Variation A remains the clear winner with 94% statistical significance.</p>
                            </div>
                        </Modal>

                        <Modal isOpen={workflowModalOpen} onClose={() => setWorkflowModalOpen(false)} title="Create new workflow" subtitle="Automate your experimentation process with AI-driven triggers.">
                            <div className="grid grid-cols-2 gap-4">
                                {[
                                    { icon: Mail, title: "Send email", desc: "Notify stakeholders on results." },
                                    { icon: MessageSquare, title: "Alert on Slack", desc: "Push stats to #xp-alerts." },
                                    { icon: Pause, title: "Pause XP if", desc: "Automatically stop on regressions." },
                                    { icon: Play, title: "Start XP if", desc: "Trigger tests on traffic surges." },
                                ].map((wf, i) => (
                                    <div key={i} className="p-4 border border-gray-100 rounded-xl bg-gray-50 hover:bg-white hover:border-primary/20 hover:shadow-md transition-all cursor-pointer group">
                                        <div className="h-10 w-10 bg-white rounded-lg flex items-center justify-center text-gray-400 group-hover:text-primary mb-3 shadow-sm"><wf.icon className="h-5 w-5" /></div>
                                        <h4 className="text-[13px] font-semibold text-gray-800 mb-1">{wf.title}</h4>
                                        <p className="text-[11px] text-gray-500 font-medium leading-relaxed">{wf.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </Modal>

                        <Modal isOpen={allToolsOpen} onClose={() => setAllToolsOpen(false)} title="All Tools" subtitle="Complete MCP tool directory">
                            <div className="space-y-6">
                                <div>
                                    <h3 className="text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-2.5">Featured Tools</h3>
                                    <div className="space-y-1.5">
                                        {MAIN_TOOLS.map((tool, i) => (
                                            <div key={i} onClick={() => { sendMessage(tool.title); setAllToolsOpen(false); }}
                                                className="flex items-start gap-2.5 p-2.5 hover:bg-primary/5 border border-gray-100 hover:border-primary/20 rounded-lg cursor-pointer transition-all group">
                                                <div className="mt-0.5 h-5 w-5 rounded bg-primary/5 border border-primary/10 flex items-center justify-center text-primary shrink-0 group-hover:bg-primary/10">
                                                    <tool.icon className="h-2.5 w-2.5" />
                                                </div>
                                                <div className="flex-1">
                                                    <div className="text-[11px] font-semibold text-gray-900">{tool.title}</div>
                                                    <div className="text-[10px] text-gray-400 leading-tight">{tool.desc}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <h3 className="text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-2.5">Lot 1 Tools</h3>
                                    <div className="space-y-1.5">
                                        {ALL_TOOLS.map((tool, i) => (
                                            <div key={i} onClick={() => { sendMessage(tool.title); setAllToolsOpen(false); }}
                                                className="flex items-start gap-2.5 p-2.5 hover:bg-gray-100 border border-gray-100 hover:border-gray-200 rounded-lg cursor-pointer transition-all group">
                                                <div className="mt-0.5 h-5 w-5 rounded bg-gray-100 border border-gray-200 flex items-center justify-center text-gray-400 shrink-0 group-hover:bg-gray-200">
                                                    <tool.icon className="h-2.5 w-2.5" />
                                                </div>
                                                <div className="flex-1">
                                                    <div className="text-[11px] font-semibold text-gray-700">{tool.title}</div>
                                                    <div className="text-[10px] text-gray-400 leading-tight">{tool.desc}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </Modal>

                        <UnderTheHoodPanel events={uthEvents} open={uthOpen} kaiOpen={kaiOpen} onClear={clearUth} onClose={() => setUthOpen(false)} />
                    </main>

                    <ArchitectureOverlay open={archOpen} onClose={() => setArchOpen(false)} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
