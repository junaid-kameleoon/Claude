<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kai v2.1 - Experiment Copilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3838E7',
                        background: '#FDFDFF',
                    },
                    fontFamily: {
                        sans: ['IBM Plex Sans', 'sans-serif'],
                        mono: ['IBM Plex Mono', 'monospace'],
                    },
                    borderRadius: { 'md': '8px', 'lg': '12px' }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@11.0.8/dist/framer-motion.js"></script>
    <style>
        body { background-color: #FDFDFF; font-family: 'IBM Plex Sans', sans-serif; color: #1a1a1b; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.15; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }
        .typing-dot { animation: blink 1.4s ease-in-out infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const Sparkles = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275Z"/><path d="M5 3v4"/><path d="M9 5H5"/></svg>;
        const X = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const MessageSquare = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
        const Settings2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>;
        const BarChart3 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>;
        const ChevronRight = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
        const Plus = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        const Wand2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.21 1.21 0 0 0 1.72 0L21.64 5.36a1.21 1.21 0 0 0 0-1.72Z"/><path d="m14 7 3 3"/><path d="M5 6v4"/><path d="M19 14v4"/><path d="M10 2v2"/><path d="M7 8H3"/><path d="M21 16h-4"/><path d="M11 19v3"/></svg>;
        const Bell = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>;
        const Search = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
        const ChevronDown = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m6 9 6 6 6-6"/></svg>;
        const Mail = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
        const Pause = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="4" height="16" x="6" y="4"/><rect width="4" height="16" x="14" y="4"/></svg>;
        const Play = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const CheckCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const AlertTriangle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>;
        const Zap = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;

        const cn = (...classes) => classes.filter(Boolean).join(' ');

        const MAIN_TOOLS = [
            { id: 'query_experiment_insights', icon: BarChart3, title: "Query experiment insights", desc: "Semantic breakdown of results, winner status & next steps" },
            { id: 'set_experiment_state', icon: Settings2, title: "Set experiment state", desc: "Pause, resume, stop or archive experiments" },
            { id: 'audit_and_cleanup_workspace', icon: Sparkles, title: "Audit & clean up workspace", desc: "Find stale flags and concluded experiments" },
            { id: 'simulate_user_experience', icon: Search, title: "Simulate user assignment", desc: "See which variants a user profile qualifies for" },
            { id: 'manage_progressive_rollout', icon: Zap, title: "Manage progressive rollout", desc: "Trigger safe ramps and set guardrails" },
            { id: 'generate_variant_from_design', icon: Wand2, title: "Generate variant from design", desc: "Turn a Figma URL into HTML/React code" },
        ];

        const ALL_TOOLS = [
            { id: 'get_experiment_details', icon: BarChart3, title: "Get experiment details", desc: "Configuration and metadata retrieval" },
            { id: 'list_experiments', icon: BarChart3, title: "List experiments", desc: "Searchable and filterable project overview" },
            { id: 'get_variant_code', icon: Wand2, title: "Get variant code", desc: "Secure retrieval of implementation logic" },
            { id: 'list_feature_flags', icon: Zap, title: "List feature flags", desc: "Real-time flag visibility" },
            { id: 'get_feature_flag_details', icon: Settings2, title: "Get feature flag details", desc: "Environment-specific settings and rules" },
            { id: 'create_feature_flag', icon: Plus, title: "Create feature flag", desc: "Native flag instantiation" },
            { id: 'enable_disable_feature_flag', icon: Zap, title: "Enable/disable feature flag", desc: "Immediate state control" },
            { id: 'delete_feature_flag', icon: X, title: "Delete feature flag", desc: "Cleanup of simple flag assets" },
            { id: 'audit_recent_changes', icon: Sparkles, title: "Audit recent changes", desc: "Operational visibility and logs" },
            { id: 'duplicate_feature_flag', icon: Plus, title: "Duplicate feature flag", desc: "Rapid iteration of flag logic" },
            { id: 'get_experiment_results_summary', icon: BarChart3, title: "Get experiment results summary", desc: "High-level pulse/outcomes for AI parsing" },
            { id: 'goal_list', icon: Sparkles, title: "List goals", desc: "View all tracking goals" },
            { id: 'goal_get', icon: Sparkles, title: "Get goal details", desc: "Retrieve specific goal configuration" },
            { id: 'goal_create', icon: Plus, title: "Create goal", desc: "Add new tracking goal" },
            { id: 'goal_delete', icon: X, title: "Delete goal", desc: "Remove a goal" },
            { id: 'segment_list', icon: Sparkles, title: "List segments", desc: "View all audience segments" },
            { id: 'segment_get', icon: Sparkles, title: "Get segment details", desc: "Retrieve segment configuration" },
            { id: 'segment_create', icon: Plus, title: "Create segment", desc: "Define new audience segment" },
            { id: 'targeting_rule_list', icon: Settings2, title: "List targeting rules", desc: "View all targeting rules" },
            { id: 'targeting_rule_create', icon: Plus, title: "Create targeting rule", desc: "Add new targeting rule" },
            { id: 'feature_flag_variation_create', icon: Plus, title: "Create flag variation", desc: "Add variant to feature flag" },
            { id: 'feature_flag_rule_targeted_create', icon: Settings2, title: "Create targeted rule", desc: "Set up targeted delivery rule" },
            { id: 'feature_flag_rule_progressive_create', icon: Zap, title: "Create progressive rule", desc: "Set up progressive rollout rule" },
        ];

        const MCP_TOOLS = [...MAIN_TOOLS, ...ALL_TOOLS];

        const SUGGESTIONS = [
            "Query experiment results",
            "Clean up my stale flags",
            "Pause an experiment",
            "Ship a PBX variant to code",
        ];

        const getMockResponse = (text) => {
            const l = text.toLowerCase();
            // Advanced tools (rich responses)
            if (l.includes('query') && l.includes('result'))
                return { tool: 'query_experiment_insights', label: 'Query Experiment Insights', type: 'queryfilter' };
            if (l.includes('checkout') || l.includes('winning') || l.includes('insight') || l.includes('result'))
                return { tool: 'query_experiment_insights', label: 'Query Experiment Insights', type: 'insights' };
            if (l.includes('stale') || l.includes('clean') || l.includes('audit') || l.includes('flags'))
                return { tool: 'audit_and_cleanup_workspace', label: 'Audit & Cleanup Workspace', type: 'audit' };
            if (l.includes('pause') && (l.includes('experiment') || l.includes('an ')))
                return { tool: 'set_experiment_state', label: 'Set Experiment State', type: 'pausefilter' };
            if (l.includes('pause') || l.includes('stop') || l.includes('pricing page') || l.includes('state'))
                return { tool: 'set_experiment_state', label: 'Set Experiment State', type: 'pause' };
            if (l.includes('simulate') || l.includes('assignment') || l.includes('user profile'))
                return { tool: 'simulate_user_experience', label: 'Simulate User Experience', type: 'simulate' };
            if (l.includes('rollout') || l.includes('ramp') || l.includes('progressive'))
                return { tool: 'manage_progressive_rollout', label: 'Manage Progressive Rollout', type: 'rollout' };
            if (l.includes('ship') && l.includes('pbx') || l.includes('transpose') || l.includes('variant to code'))
                return { tool: 'generate_variant_from_design', label: 'Ship Variant to Code', type: 'shipvariant' };
            if (l.includes('generate') || l.includes('variant') || l.includes('figma') || l.includes('design'))
                return { tool: 'generate_variant_from_design', label: 'Generate Variant from Design', type: 'generate' };
            // Baseline tools (simple back-and-forth)
            if (l.includes('list') && (l.includes('experiment') || l.includes('flag')))
                return { tool: 'list_experiments', label: 'List Experiments', type: 'followup', question: 'Searching for active experiments... would you like to filter by status, owner, or date range?' };
            if (l.includes('get details') || l.includes('details'))
                return { tool: 'get_experiment_details', label: 'Get Experiment Details', type: 'followup', question: 'Which experiment? (provide experiment ID or name)' };
            if (l.includes('goal') || l.includes('tracking'))
                return { tool: 'goal_list', label: 'List Goals', type: 'followup', question: 'Fetching tracking goals... found 12 goals. Need help with a specific one?' };
            if (l.includes('segment') || l.includes('audience'))
                return { tool: 'segment_list', label: 'List Segments', type: 'followup', question: 'Loading audience segments... how would you like to filter them?' };
            if (l.includes('duplicate') || l.includes('copy'))
                return { tool: 'duplicate_feature_flag', label: 'Duplicate Feature Flag', type: 'followup', question: 'Which flag should I duplicate? (provide flag key or name)' };
            if (l.includes('delete') || l.includes('remove'))
                return { tool: 'delete_feature_flag', label: 'Delete Feature Flag', type: 'followup', question: 'Which flag do you want to delete? (provide flag key — this action is permanent)' };
            if (l.includes('code') || l.includes('implementation'))
                return { tool: 'get_variant_code', label: 'Get Variant Code', type: 'followup', question: 'Which variant? (experiment ID + variant name)' };
            if (l.includes('recent') || l.includes('history') || l.includes('changelog'))
                return { tool: 'audit_recent_changes', label: 'Audit Recent Changes', type: 'followup', question: 'Pulling activity logs... showing changes from the last 7 days. Want to filter by user or action type?' };
            return null;
        };

        const InsightsContent = () => (
            <div>
                <p className="text-[12px] text-gray-600 mb-3 leading-relaxed">
                    Here's the breakdown for <span className="font-semibold text-gray-800">Checkout Page Redesign</span> · ID #4089:
                </p>
                <div className="grid grid-cols-3 gap-1.5 mb-3">
                    {[
                        { label: 'Control', value: '12.4%', sub: 'baseline', winner: false },
                        { label: 'Variant A', value: '14.8%', sub: '+19.4% ↑', winner: true },
                        { label: 'Variant B', value: '13.2%', sub: '+6.5% ↑', winner: false },
                    ].map(s => (
                        <div key={s.label} className={`p-2.5 rounded-lg border ${s.winner ? 'border-primary/20 bg-primary/5' : 'border-gray-100 bg-gray-50'}`}>
                            <div className="text-[9px] font-semibold text-gray-400 uppercase tracking-wider mb-0.5">{s.label}</div>
                            <div className={`text-base font-bold ${s.winner ? 'text-primary' : 'text-gray-800'}`}>{s.value}</div>
                            <div className={`text-[10px] font-medium ${s.winner ? 'text-primary/70' : 'text-gray-400'}`}>{s.sub}</div>
                        </div>
                    ))}
                </div>
                <div className="flex items-center gap-2 mb-3">
                    <div className="flex-1 h-1 bg-gray-100 rounded-full overflow-hidden">
                        <div className="h-full bg-primary rounded-full" style={{width: '94.2%'}} />
                    </div>
                    <span className="text-[11px] font-semibold text-gray-700 whitespace-nowrap">94.2% confidence</span>
                </div>
                <div className="flex items-start gap-2 p-2.5 bg-amber-50 border border-amber-100 rounded-lg mb-3">
                    <AlertTriangle className="h-3.5 w-3.5 text-amber-500 mt-0.5 shrink-0" />
                    <p className="text-[11px] text-amber-700 leading-relaxed">Variant A is degrading page load by +180ms. Recommend a performance review before shipping.</p>
                </div>
                <div className="flex gap-2">
                    <button className="px-3 py-1.5 bg-primary text-white rounded text-[11px] font-semibold hover:bg-blue-700 transition-colors">Transpose to code</button>
                    <button className="px-3 py-1.5 border border-gray-200 text-gray-600 rounded text-[11px] font-semibold hover:border-gray-300 transition-colors">Pause losing variants</button>
                </div>
            </div>
        );

        const AuditContent = () => {
            const flags = ['checkout-v1-legacy', 'hero-banner-test-q2', 'mobile-nav-experiment', 'pricing-table-old'];
            const [copied, setCopied] = React.useState(false);
            const copyIds = () => {
                navigator.clipboard.writeText(flags.join(', '));
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };
            return (
                <div>
                    <p className="text-[12px] text-gray-600 mb-3 leading-relaxed">
                        Found <span className="font-semibold text-gray-800">4 stale items</span> in your workspace:
                    </p>
                    <div className="space-y-1.5 mb-3">
                        {[
                            { name: 'checkout-v1-legacy', sev: 'high', reason: '100% rolled out · 8 months old' },
                            { name: 'hero-banner-test-q2', sev: 'high', reason: 'Concluded · never cleaned up' },
                            { name: 'mobile-nav-experiment', sev: 'med', reason: 'Paused for 3+ months' },
                            { name: 'pricing-table-old', sev: 'med', reason: 'Winner shipped · flag still live' },
                        ].map(f => (
                            <div key={f.name} className="flex items-center gap-2.5 p-2 bg-gray-50 rounded-lg border border-gray-100">
                                <div className={`h-1.5 w-1.5 rounded-full shrink-0 ${f.sev === 'high' ? 'bg-red-400' : 'bg-amber-400'}`} />
                                <span className="text-[11px] font-mono font-medium text-gray-800 flex-1 truncate">{f.name}</span>
                                <span className="text-[10px] text-gray-400 whitespace-nowrap">{f.reason}</span>
                            </div>
                        ))}
                    </div>
                    <div className="flex gap-2">
                        <button className="px-3 py-1.5 bg-primary text-white rounded text-[11px] font-semibold hover:bg-blue-700 transition-colors">Delete all stale flags</button>
                        <button onClick={copyIds} className={`px-3 py-1.5 border rounded text-[11px] font-semibold transition-colors ${copied ? 'bg-green-50 border-green-200 text-green-600' : 'border-gray-200 text-gray-600 hover:border-gray-300'}`}>{copied ? '✓ Copied' : 'Copy flag IDs'}</button>
                    </div>
                </div>
            );
        };

        const PauseContent = () => (
            <div>
                <div className="flex items-center gap-2.5 mb-3">
                    <div className="h-7 w-7 bg-green-100 rounded-full flex items-center justify-center shrink-0">
                        <CheckCircle className="h-4 w-4 text-green-600" />
                    </div>
                    <span className="text-[12px] font-semibold text-gray-800">Pricing Page Variation - 1 has been paused</span>
                </div>
                <div className="space-y-1.5 pl-9 mb-3">
                    {[
                        ['Environments', 'Production, Staging'],
                        ['Variants affected', 'Control, Variant A, Variant B'],
                        ['Traffic', 'Reset to 0%'],
                        ['Reason logged', 'Manual pause via Kai'],
                    ].map(([k, v]) => (
                        <div key={k} className="flex gap-2 text-[11px]">
                            <span className="text-gray-400 w-28 shrink-0">{k}</span>
                            <span className="text-gray-700 font-medium">{v}</span>
                        </div>
                    ))}
                </div>
                <div className="flex gap-2 pl-9">
                    <button className="px-3 py-1.5 border border-gray-200 text-gray-600 rounded text-[11px] font-semibold hover:border-gray-300 transition-colors">Notify team on Slack</button>
                    <button className="px-3 py-1.5 border border-gray-200 text-gray-600 rounded text-[11px] font-semibold hover:border-gray-300 transition-colors">Archive experiment</button>
                </div>
            </div>
        );

        const SimulateContent = () => (
            <div>
                <p className="text-[12px] text-gray-600 mb-3 leading-relaxed">
                    Simulated profile: <span className="font-mono text-[11px] bg-gray-100 px-1.5 py-0.5 rounded">country=FR · device=mobile · is_vip=true</span>
                </p>
                <div className="space-y-2 mb-3">
                    {[
                        { flag: 'checkout-redesign', variant: 'Variant A', rule: 'EU Segment · VIP tier', color: 'primary' },
                        { flag: 'mobile-nav-v2', variant: 'Control', rule: 'Mobile device targeting', color: 'gray' },
                        { flag: 'pricing-table-new', variant: 'Not eligible', rule: 'Excluded: experiment concluded', color: 'red' },
                    ].map(r => (
                        <div key={r.flag} className="p-2.5 bg-gray-50 border border-gray-100 rounded-lg">
                            <div className="flex items-center justify-between mb-0.5">
                                <span className="text-[11px] font-mono font-medium text-gray-800">{r.flag}</span>
                                <span className={`text-[10px] font-semibold px-1.5 py-0.5 rounded ${r.color === 'primary' ? 'bg-primary/10 text-primary' : r.color === 'red' ? 'bg-red-50 text-red-500' : 'bg-gray-100 text-gray-500'}`}>{r.variant}</span>
                            </div>
                            <span className="text-[10px] text-gray-400">{r.rule}</span>
                        </div>
                    ))}
                </div>
                <button className="px-3 py-1.5 border border-gray-200 text-gray-600 rounded text-[11px] font-semibold hover:border-gray-300 transition-colors">Try a different profile</button>
            </div>
        );

        const RolloutContent = () => (
            <div>
                <p className="text-[12px] text-gray-600 mb-3 leading-relaxed">
                    Ramping <span className="font-semibold text-gray-800">checkout-redesign</span> to <span className="font-mono bg-gray-100 px-1.5 py-0.5 rounded">50%</span>:
                </p>
                <div className="mb-3 p-3 bg-gray-50 border border-gray-100 rounded-lg">
                    <div className="flex items-center justify-between mb-2">
                        <span className="text-[10px] font-semibold text-gray-600 uppercase tracking-wider">Traffic Allocation</span>
                        <span className="text-[11px] font-bold text-primary">50%</span>
                    </div>
                    <div className="h-2 bg-gray-200 rounded-full overflow-hidden">
                        <div className="h-full bg-primary rounded-full" style={{width: '50%'}} />
                    </div>
                </div>
                <div className="space-y-1.5 mb-3">
                    {[

                                            <span className="text-[10px] font-medium text-gray-400 bg-gray-50 border border-gray-100 px-1.5 py-0.5 rounded">v2.1</span>
                                        </div>
                                        <div className="flex items-center gap-1">
                                            <button onClick={() => { setMessages([{role: 'assistant', content: "Hi Junaid! 👋\n\nI'm Kai, your experiment copilot. I can run tools directly — query results, pause experiments, audit stale flags, simulate user assignment, and more.\n\nType / to see available tools, or just ask me in plain language."}]); }} className="p-1.5 hover:bg-gray-100 rounded-md text-gray-400" title="Reset chat"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36M20.49 15a9 9 0 0 1-14.85 3.36"/></svg></button>
                                            <button onClick={() => setKaiOpen(false)} className="p-1.5 hover:bg-gray-100 rounded-md text-gray-400"><X className="h-4 w-4" /></button>
                                        </div>
                                    </div>

                                    <div className="flex-1 overflow-y-auto p-4 space-y-3">
                                        {messages.map((m, i) => (
                                            <motion.div key={i} initial={{ opacity: 0, y: 6 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.2 }}>
                                                <MessageBubble message={m} />
                                            </motion.div>
                                        ))}

                                        <AnimatePresence>
                                            {typingState && (
                                                <motion.div initial={{ opacity: 0, y: 6 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0 }} className="flex flex-col items-start gap-2">
                                                    {typingState.step === 'tool_call' && typingState.tool && (
                                                        <div className="flex items-center gap-1.5 px-2.5 py-1.5 bg-primary/5 border border-primary/10 rounded-lg text-[11px] text-primary font-medium">
                                                            <Zap className="h-3 w-3 shrink-0" />
                                                            <span>Calling</span>
                                                            <span className="font-mono bg-primary/10 px-1.5 py-0.5 rounded">{typingState.tool.id}</span>
                                                            <span className="flex gap-0.5 ml-0.5">
                                                                <span className="h-1 w-1 bg-primary rounded-full typing-dot" />
                                                                <span className="h-1 w-1 bg-primary rounded-full typing-dot" />
                                                                <span className="h-1 w-1 bg-primary rounded-full typing-dot" />
                                                            </span>
                                                        </div>
                                                    )}
                                                    {typingState.step === 'thinking' && (
                                                        <div className="px-3.5 py-3 bg-white border border-gray-100 shadow-sm rounded-2xl rounded-tl-sm">
                                                            <span className="flex gap-1">
                                                                <span className="h-1.5 w-1.5 bg-gray-300 rounded-full typing-dot" />
                                                                <span className="h-1.5 w-1.5 bg-gray-300 rounded-full typing-dot" />
                                                                <span className="h-1.5 w-1.5 bg-gray-300 rounded-full typing-dot" />
                                                            </span>
                                                        </div>
                                                    )}
                                                </motion.div>
                                            )}
                                        </AnimatePresence>

                                        {showSuggestions && (
                                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="flex flex-wrap gap-2 justify-end pt-2">
                                                {SUGGESTIONS.map((s, i) => (
                                                    <button key={i} onClick={() => sendMessage(s)}
                                                        className="px-3 py-2 bg-transparent hover:bg-gray-50 border border-gray-200 hover:border-gray-300 rounded-lg text-[12px] text-gray-500 hover:text-gray-700 font-normal transition-all whitespace-nowrap"
                                                    >
                                                        {s}
                                                    </button>
                                                ))}
                                            </motion.div>
                                        )}

                                        <div ref={messagesEndRef} />
                                    </div>

                                    <div className="p-3 bg-white border-t border-gray-100 relative shrink-0">
                                        <AnimatePresence>
                                            {showSlashMenu && hasSearchResults && (
                                                <motion.div
                                                    initial={{ opacity: 0, y: 8 }}
                                                    animate={{ opacity: 1, y: 0 }}
                                                    exit={{ opacity: 0, y: 8 }}
                                                    className="absolute bottom-full mb-2 left-3 right-3 bg-white border border-gray-200 rounded-xl shadow-2xl overflow-hidden z-50"
                                                >
                                                    <div className="px-3 py-2 bg-gray-50 border-b border-gray-100 flex items-center gap-1.5">
                                                        <span className="text-[12px] font-bold text-gray-400">/</span>
                                                        <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Tools</span>
                                                    </div>
                                                    <div className="max-h-56 overflow-y-auto">
                                                        {filteredMainTools.map((tool, i) => (
                                                            <div key={i} onClick={() => { setInput(`/${tool.id} `); setShowSlashMenu(false); textareaRef.current?.focus(); }}
                                                                className="flex items-start gap-3 p-3 hover:bg-gray-50 cursor-pointer border-b border-gray-50"
                                                            >
                                                                <div className="mt-0.5 h-6 w-6 rounded bg-primary/5 border border-primary/10 flex items-center justify-center text-primary shrink-0">
                                                                    <tool.icon className="h-3 w-3" />
                                                                </div>
                                                                <div>
                                                                    <div className="text-[12px] font-semibold text-gray-900">{tool.title}</div>
                                                                    <div className="text-[11px] text-gray-400 leading-tight mt-0.5">{tool.desc}</div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                        {filteredAllTools.length > 0 && (
                                                            <>
                                                                <button onClick={() => setExpandedAllTools(!expandedAllTools)}
                                                                    className="w-full flex items-center gap-2 p-3 hover:bg-gray-50 border-b border-gray-50 text-left transition-colors">
                                                                    <ChevronDown className={`h-4 w-4 text-gray-400 transition-transform ${expandedAllTools ? 'rotate-180' : ''}`} />
                                                                    <span className="text-[11px] font-semibold text-gray-600 uppercase tracking-wider">All Tools</span>
                                                                    <span className="text-[10px] text-gray-400 ml-auto">{filteredAllTools.length}</span>
                                                                </button>
                                                                <AnimatePresence>
                                                                    {expandedAllTools && (
                                                                        <motion.div initial={{ opacity: 0, height: 0 }} animate={{ opacity: 1, height: 'auto' }} exit={{ opacity: 0, height: 0 }}>
                                                                            {filteredAllTools.map((tool, i) => (
                                                                                <div key={i} onClick={() => { setInput(`/${tool.id} `); setShowSlashMenu(false); textareaRef.current?.focus(); }}
                                                                                    className="flex items-start gap-3 p-3 hover:bg-gray-50 cursor-pointer border-b border-gray-50 last:border-0 bg-gray-25"
                                                                                >
                                                                                    <div className="mt-0.5 h-6 w-6 rounded bg-gray-200/50 border border-gray-200 flex items-center justify-center text-gray-400 shrink-0">
                                                                                        <tool.icon className="h-3 w-3" />
                                                                                    </div>
                                                                                    <div>
                                                                                        <div className="text-[12px] font-semibold text-gray-700">{tool.title}</div>
                                                                                        <div className="text-[11px] text-gray-400 leading-tight mt-0.5">{tool.desc}</div>
                                                                                    </div>
                                                                                </div>
                                                                            ))}
                                                                        </motion.div>
                                                                    )}
                                                                </AnimatePresence>
                                                            </>
                                                        )}
                                                    </div>
                                                </motion.div>
                                            )}
                                        </AnimatePresence>

                                        <div className="bg-gray-50 border border-gray-200 rounded-xl p-3 focus-within:border-primary focus-within:bg-white transition-all">
                                            <textarea
                                                ref={textareaRef}
                                                className="w-full h-14 resize-none outline-none text-[12px] font-medium text-gray-900 placeholder:text-gray-400 bg-transparent"
                                                placeholder="Ask anything, or type / to use a tool..."
                                                value={input}
                                                onChange={(e) => {
                                                    const val = e.target.value;
                                                    setInput(val);
                                                    setShowSlashMenu(val.startsWith('/'));
                                                }}
                                                onKeyDown={(e) => {
                                                    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(input); }
                                                    if (e.key === 'Escape') setShowSlashMenu(false);
                                                }}
                                            />
                                            <div className="flex items-center justify-between mt-1">
                                                <button onClick={() => setAllToolsOpen(true)} className="h-7 w-7 border-2 border-gray-300 rounded-md flex items-center justify-center text-gray-500 hover:border-gray-400 hover:text-gray-600 transition-colors font-bold" title="Slash commands">
                                                    /
                                                </button>
                                                <span className="text-[10px] text-gray-300 font-medium">↵ send · shift+↵ newline</span>
                                                <button onClick={() => sendMessage(input)}
                                                    className={cn("h-7 w-7 rounded-full flex items-center justify-center transition-colors",
                                                        input.trim() ? "bg-primary text-white hover:bg-blue-700" : "bg-gray-200 text-gray-400"
                                                    )}>
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </motion.aside>
                            )}
                        </AnimatePresence>

                        <Modal isOpen={pbxModalOpen} onClose={() => setPbxModalOpen(false)} title="New A/B test by prompt" subtitle="Create an experiment in seconds by prompting the AI."
                            footer={<><button onClick={() => setPbxModalOpen(false)} className="text-xs font-bold text-gray-500 flex items-center gap-1 hover:text-gray-700"><ChevronDown className="h-3 w-3 rotate-90" /> BACK</button><button className="px-6 py-2 bg-gray-100 text-gray-400 rounded-lg text-xs font-bold uppercase tracking-wider">CREATE</button></>}>
                            <div className="space-y-4">
                                <div className="space-y-1.5"><label className="text-[11px] font-bold text-gray-900 uppercase tracking-tight">Name</label><input type="text" placeholder="Give your experiment a name" className="w-full p-3 border border-gray-200 rounded-lg text-sm bg-white outline-none focus:ring-1 focus:ring-primary transition-all" /></div>
                                <div className="space-y-1.5"><label className="text-[11px] font-bold text-gray-900 uppercase tracking-tight">Project</label><div className="w-full p-3 border border-gray-200 rounded-lg text-sm bg-white flex items-center justify-between text-gray-400 cursor-pointer">Select a project<ChevronDown className="h-4 w-4" /></div></div>
                                <div className="space-y-1.5"><label className="text-[11px] font-bold text-gray-900 uppercase tracking-tight">URL</label><input type="text" placeholder="Enter the URL to launch the simulation" className="w-full p-3 border border-gray-200 rounded-lg text-sm bg-white outline-none focus:ring-1 focus:ring-primary transition-all" /></div>
                                <div className="space-y-1.5"><div className="flex justify-between items-center"><label className="text-[11px] font-bold text-gray-900 uppercase tracking-tight">Description</label><span className="text-[10px] text-gray-400">0 / 500</span></div><textarea rows="4" placeholder="Describe the purpose of your experiment." className="w-full p-3 border border-gray-200 rounded-lg text-sm bg-white outline-none focus:ring-1 focus:ring-primary transition-all resize-none"></textarea></div>
                                <button className="flex items-center gap-2 px-4 py-2 border border-primary text-primary rounded-lg text-xs font-bold hover:bg-primary/5 transition-colors"><Plus className="h-3.5 w-3.5" /> ADD TAG</button>
                            </div>
                        </Modal>

                        <Modal isOpen={chartModalOpen} onClose={() => setChartModalOpen(false)} title="EU Segment Results Summary" subtitle="Last 72 hours performance breakdown.">
                            <SimpleChart expanded />
                            <div className="mt-8 space-y-4">
                                <div className="p-4 bg-gray-50 rounded-lg grid grid-cols-3 gap-4">
                                    <div><div className="text-[10px] font-medium text-gray-400 uppercase tracking-wider">Revenue Uplift</div><div className="text-xl font-bold text-green-600">+$2,410</div></div>
                                    <div><div className="text-[10px] font-medium text-gray-400 uppercase tracking-wider">Confidence</div><div className="text-xl font-bold text-gray-900">94.2%</div></div>
                                    <div><div className="text-[10px] font-medium text-gray-400 uppercase tracking-wider">Visitors</div><div className="text-xl font-bold text-gray-900">12,402</div></div>
                                </div>
                                <p className="text-xs font-medium text-gray-600 leading-relaxed">Variation A remains the clear winner with 94% statistical significance.</p>
                            </div>
                        </Modal>

                        <Modal isOpen={workflowModalOpen} onClose={() => setWorkflowModalOpen(false)} title="Create new workflow" subtitle="Automate your experimentation process with AI-driven triggers.">
                            <div className="grid grid-cols-2 gap-4">
                                {[
                                    { icon: Mail, title: "Send email", desc: "Notify stakeholders on results." },
                                    { icon: MessageSquare, title: "Alert on Slack", desc: "Push stats to #xp-alerts." },
                                    { icon: Pause, title: "Pause XP if", desc: "Automatically stop on regressions." },
                                    { icon: Play, title: "Start XP if", desc: "Trigger tests on traffic surges." },
                                ].map((wf, i) => (
                                    <div key={i} className="p-4 border border-gray-100 rounded-xl bg-gray-50 hover:bg-white hover:border-primary/20 hover:shadow-md transition-all cursor-pointer group">
                                        <div className="h-10 w-10 bg-white rounded-lg flex items-center justify-center text-gray-400 group-hover:text-primary mb-3 shadow-sm"><wf.icon className="h-5 w-5" /></div>
                                        <h4 className="text-[13px] font-semibold text-gray-800 mb-1">{wf.title}</h4>
                                        <p className="text-[11px] text-gray-500 font-medium leading-relaxed">{wf.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </Modal>

                        <Modal isOpen={allToolsOpen} onClose={() => setAllToolsOpen(false)} title="All Tools" subtitle="Complete MCP tool directory">
                            <div className="space-y-6">
                                <div>
                                    <h3 className="text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-2.5">Featured Tools</h3>
                                    <div className="space-y-1.5">
                                        {MAIN_TOOLS.map((tool, i) => (
                                            <div key={i} onClick={() => { sendMessage(tool.title); setAllToolsOpen(false); }}
                                                className="flex items-start gap-2.5 p-2.5 hover:bg-primary/5 border border-gray-100 hover:border-primary/20 rounded-lg cursor-pointer transition-all group">
                                                <div className="mt-0.5 h-5 w-5 rounded bg-primary/5 border border-primary/10 flex items-center justify-center text-primary shrink-0 group-hover:bg-primary/10">
                                                    <tool.icon className="h-2.5 w-2.5" />
                                                </div>
                                                <div className="flex-1">
                                                    <div className="text-[11px] font-semibold text-gray-900">{tool.title}</div>
                                                    <div className="text-[10px] text-gray-400 leading-tight">{tool.desc}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <h3 className="text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-2.5">Lot 1 Tools</h3>
                                    <div className="space-y-1.5">
                                        {ALL_TOOLS.map((tool, i) => (
                                            <div key={i} onClick={() => { sendMessage(tool.title); setAllToolsOpen(false); }}
                                                className="flex items-start gap-2.5 p-2.5 hover:bg-gray-100 border border-gray-100 hover:border-gray-200 rounded-lg cursor-pointer transition-all group">
                                                <div className="mt-0.5 h-5 w-5 rounded bg-gray-100 border border-gray-200 flex items-center justify-center text-gray-400 shrink-0 group-hover:bg-gray-200">
                                                    <tool.icon className="h-2.5 w-2.5" />
                                                </div>
                                                <div className="flex-1">
                                                    <div className="text-[11px] font-semibold text-gray-700">{tool.title}</div>
                                                    <div className="text-[10px] text-gray-400 leading-tight">{tool.desc}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </Modal>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
