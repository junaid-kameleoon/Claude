<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kameleoon — Workflow Builder</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    body { font-family: 'Roboto', sans-serif; background: #FCFCFD; color: #1B1B23; }
    .canvas { background-image: radial-gradient(circle, #E1DFE7 0.5px, transparent 0.5px); background-size: 20px 20px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

const NODE_TYPES = {
  trigger: { label: 'Trigger', color: '#3B82F6', bgColor: '#EFF6FF', icon: '⚡' },
  agent: { label: 'Agent', color: '#A855F7', bgColor: '#FAF5FF', icon: '🤖' },
  logic: { label: 'Logic', color: '#F59E0B', bgColor: '#FFFBF0', icon: '🔀' },
  action: { label: 'Action', color: '#10B981', bgColor: '#F0FDF4', icon: '✓' },
  wait: { label: 'Wait', color: '#6B7280', bgColor: '#F9FAFB', icon: '⏱' }
};

const NODES_DATA = [
  { id: '1', type: 'trigger', label: 'Chat Trigger', x: 100, y: 100 },
  { id: '2', type: 'agent', label: 'Generate Ideas', x: 350, y: 100 },
  { id: '3', type: 'logic', label: 'Score Check', x: 600, y: 100 },
  { id: '4', type: 'action', label: 'Publish', x: 850, y: 50 },
  { id: '5', type: 'action', label: 'Archive', x: 850, y: 150 }
];

const EDGES_DATA = [
  { from: '1', to: '2' },
  { from: '2', to: '3' },
  { from: '3', to: '4', label: 'Pass' },
  { from: '3', to: '5', label: 'Fail' }
];

function WorkflowCanvas() {
  const [nodes, setNodes] = useState(NODES_DATA);
  const [edges, setEdges] = useState(EDGES_DATA);
  const [selectedNode, setSelectedNode] = useState(null);
  const [hoveredEdge, setHoveredEdge] = useState(null);
  const svgRef = useRef(null);

  const addNodeAfterEdge = (fromId, toId) => {
    const fromNode = nodes.find(n => n.id === fromId);
    const toNode = nodes.find(n => n.id === toId);
    const newX = (fromNode.x + toNode.x) / 2;
    const newY = (fromNode.y + toNode.y) / 2 + 80;
    const newId = Math.max(...nodes.map(n => parseInt(n.id)), 0) + 1;

    const newNode = { id: String(newId), type: 'agent', label: 'New Step', x: newX, y: newY };
    setNodes([...nodes, newNode]);

    const newEdges = edges.filter(e => !(e.from === fromId && e.to === toId));
    newEdges.push({ from: fromId, to: String(newId) });
    newEdges.push({ from: String(newId), to: toId });
    setEdges(newEdges);
    setSelectedNode(String(newId));
  };

  const updateNode = (id, updates) => {
    setNodes(nodes.map(n => n.id === id ? { ...n, ...updates } : n));
  };

  return (
    <div className="flex h-full">
      <div className="flex-1 canvas relative overflow-hidden">
        <svg ref={svgRef} className="w-full h-full absolute inset-0" style={{ overflow: 'visible' }}>
          {edges.map((edge, idx) => {
            const fromNode = nodes.find(n => n.id === edge.from);
            const toNode = nodes.find(n => n.id === edge.to);
            if (!fromNode || !toNode) return null;

            const x1 = fromNode.x + 100;
            const y1 = fromNode.y + 40;
            const x2 = toNode.x;
            const y2 = toNode.y + 40;
            const mx = (x1 + x2) / 2;
            const my = (y1 + y2) / 2;

            return (
              <g key={`edge-${idx}`}>
                <path d={`M ${x1} ${y1} L ${mx} ${my} L ${x2} ${y2}`} stroke="#C7C5D0" strokeWidth="2" fill="none" markerEnd="url(#arrowhead)" />
                <path d={`M ${x1} ${y1} L ${mx} ${my} L ${x2} ${y2}`} stroke="transparent" strokeWidth="12" fill="none" className="cursor-pointer" onMouseEnter={() => setHoveredEdge(idx)} onMouseLeave={() => setHoveredEdge(null)} />
                {hoveredEdge === idx && (
                  <g onClick={() => addNodeAfterEdge(edge.from, edge.to)} className="cursor-pointer">
                    <circle cx={mx} cy={my} r="18" fill="white" stroke="#3838E7" strokeWidth="2" />
                    <text x={mx} y={my} textAnchor="middle" dy="0.3em" fontSize="14" fontWeight="bold" fill="#3838E7">+</text>
                  </g>
                )}
                {edge.label && <text x={mx} y={my - 10} textAnchor="middle" fontSize="11" fill="#666">{edge.label}</text>}
              </g>
            );
          })}
          <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
              <polygon points="0 0, 10 3, 0 6" fill="#C7C5D0" />
            </marker>
          </defs>
        </svg>

        {nodes.map(node => {
          const config = NODE_TYPES[node.type];
          return (
            <div key={node.id} onClick={() => setSelectedNode(node.id)} className={`absolute w-24 transition-all cursor-pointer ${selectedNode === node.id ? 'ring-2 ring-blue-500 shadow-lg' : 'hover:shadow-md'}`}
              style={{ left: node.x, top: node.y, backgroundColor: config.bgColor, borderRadius: '12px', padding: '12px', border: `2px solid ${selectedNode === node.id ? '#3838E7' : 'transparent'}`, textAlign: 'center' }}>
              <div style={{ fontSize: '18px', marginBottom: '4px' }}>{config.icon}</div>
              <div style={{ fontSize: '12px', fontWeight: '600', color: '#1B1B23' }}>{node.label}</div>
              <div style={{ fontSize: '10px', color: '#666', marginTop: '4px' }}>{config.label}</div>
            </div>
          );
        })}
      </div>

      {selectedNode && (
        <div className="w-72 bg-white border-l border-gray-200 flex flex-col shadow-lg">
          <div className="p-4 border-b border-gray-200">
            <h2 className="font-semibold text-gray-900">{nodes.find(n => n.id === selectedNode)?.label}</h2>
            <p className="text-xs text-gray-500 mt-1">{NODE_TYPES[nodes.find(n => n.id === selectedNode)?.type].label}</p>
          </div>
          <div className="flex-1 overflow-y-auto p-4 space-y-4">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Label</label>
              <input type="text" value={nodes.find(n => n.id === selectedNode)?.label || ''} onChange={(e) => updateNode(selectedNode, { label: e.target.value })} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Type</label>
              <select value={nodes.find(n => n.id === selectedNode)?.type || ''} onChange={(e) => updateNode(selectedNode, { type: e.target.value })} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                {Object.entries(NODE_TYPES).map(([key, val]) => (<option key={key} value={key}>{val.label}</option>))}
              </select>
            </div>
          </div>
          <div className="p-4 border-t border-gray-200 flex gap-2">
            <button className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 text-sm">Save</button>
            <button onClick={() => setSelectedNode(null)} className="flex-1 px-4 py-2 border border-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-50 text-sm">Close</button>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  return (
    <div className="flex h-screen flex-col">
      <div className="h-16 border-b border-gray-200 bg-white flex items-center px-6">
        <h1 className="text-xl font-semibold text-gray-900">Workflow Builder</h1>
      </div>
      <div className="flex-1 overflow-hidden">
        <WorkflowCanvas />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
