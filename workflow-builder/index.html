<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Builder</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; }
    .node { position: absolute; width: 100px; padding: 12px; background: white; border: 2px solid #333; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; font-size: 13px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

function App() {
  const [nodes] = useState([
    { id: 1, label: 'Trigger', x: 50, y: 50 },
    { id: 2, label: 'Agent', x: 250, y: 50 },
    { id: 3, label: 'Action', x: 450, y: 50 }
  ]);

  return (
    <div style={{ width: '100%', height: '100%', position: 'relative' }}>
      <h1 style={{ padding: '20px' }}>Workflow Builder</h1>
      
      <svg style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', pointerEvents: 'none' }}>
        <line x1="150" y1="80" x2="250" y2="80" stroke="#999" strokeWidth="2" markerEnd="url(#arrowhead)" />
        <line x1="350" y1="80" x2="450" y2="80" stroke="#999" strokeWidth="2" markerEnd="url(#arrowhead)" />
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
            <polygon points="0 0, 10 3, 0 6" fill="#999" />
          </marker>
        </defs>
      </svg>

      {nodes.map(node => (
        <div key={node.id} className="node" style={{ left: node.x, top: node.y }}>
          {node.label}
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
